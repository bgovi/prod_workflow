name: Merge Main to Dev Linearly

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight

jobs:
  merge-main-to-dev:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config user.name 'GitHub Actions'
        git config user.email 'actions@github.com'

    - name: Rebase Dev on Main
      run: |
        git checkout dev
        git rebase main
        git push origin dev --force-with-lease

    - name: Create Pull Request if Rebase Fails
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ $? -ne 0 ]; then
          gh pr create \
            --base dev \
            --head main \
            --title "Merge Main into Dev" \
            --body "Automated PR to merge main into dev after rebase failed"
        fi