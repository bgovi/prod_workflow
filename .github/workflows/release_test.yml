name: Update Version on PR Creation (Semantic Versioning)

on:
  pull_request:
    types: [opened, synchronize, edited] # Trigger when PR is opened or updated
    branches:
      - main

jobs:
  #run test


  update-version:
    #condition only if opened or synchonize with --increase_version major/minor/patch
    runs-on: ubuntu-latest


  # deploy:
  #   if: contains(github.event.push.push_options, 'deploy') # Only run if 'deploy' is in push options
  #   runs-on: ubuntu-latest
  #   --push-options=deploy


    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Branch Naming Convention
        id: check_branch
        run: |
          # Ensure branch follows the "release/**" naming convention
          if [[ "${{ github.head_ref }}" != release/* ]]; then
            echo "Not a release branch. Exiting."
            exit 0
          fi
          echo "Release branch detected: ${{ github.head_ref }}"
          # Extract the version type (e.g., major/minor) from the branch name
          VERSION_TYPE=$(echo "${{ github.head_ref }}" | sed -E 's|release/(.*)|\1|')
          echo "version_type=$VERSION_TYPE" >> $GITHUB_ENV




      - name: Fetch all tags from remote
        run: |
          # Fetch all tags from the remote repository
          git fetch --tags

      - name: Get all tags and sort them
        id: get_tags
        run: |
          # Get the list of tags and sort them using semantic versioning
          TAGS=$(git tag -l | sort -V)

          # Output the sorted list of tags
          echo "Sorted tags: $TAGS"

          # Save the sorted tags as output
          echo "::set-output name=tags::$TAGS"

      - name: Compare new tag with the largest tag
        run: |
          # Extract the new tag from the GITHUB_REF
          NEW_TAG="${GITHUB_REF##*/}"
          echo "New tag: $NEW_TAG"

          # Get the largest tag (the last tag in the sorted list)
          LARGEST_TAG=$(echo "${{ steps.get_tags.outputs.tags }}" | tail -n 1)
          echo "Largest tag: $LARGEST_TAG"

          # Compare the new tag with the largest tag
          if [[ "$NEW_TAG" > "$LARGEST_TAG" ]]; then
            echo "New tag $NEW_TAG is greater than the largest tag $LARGEST_TAG."
          else
            echo "New tag $NEW_TAG is not greater than the largest tag $LARGEST_TAG."
            exit 1
          fi
















      - name: Check for flag in commit message if synchronize is present
        id: check_flag
        run: |
          if git log -1 --pretty=%B | grep -- '--increase_version'; then
            echo "increase_version=true" >> $GITHUB_ENV
          else
            echo "increase_version=false" >> $GITHUB_ENV
          fi

      - name: Skip for GitHub Actions bot
        if: github.actor == 'github-actions[bot]'
        run: echo "Skipping because the actor is GitHub Actions bot."


      # check if version code is latest and greater than any current tag on main

      - name: Run version increase task
        if: env.increase_version == 'true'
        run: echo "Version increase triggered!"

      - name: Read Current Version
        id: read_version
        run: |
          # Read the current version from version.txt
          CURRENT_VERSION=$(cat version.txt) # Path to your version file
          echo "Current version: $CURRENT_VERSION"
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_ENV

      - name: Increment Version
        id: increment_version
        run: |
          # Parse the current version
          MAJOR=$(echo ${{ env.current_version }} | cut -d. -f1)
          MINOR=$(echo ${{ env.current_version }} | cut -d. -f2)
          PATCH=$(echo ${{ env.current_version }} | cut -d. -f3)

          # Increment the version based on branch naming convention
          case "${{ env.version_type }}" in
            major)
              NEW_VERSION=$((MAJOR+1)).0.0
              ;;
            minor)
              NEW_VERSION=${MAJOR}.$((MINOR+1)).0
              ;;
            patch|*)
              NEW_VERSION=${MAJOR}.${MINOR}.$((PATCH+1))
              ;;
          esac

          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_ENV

      - name: authenticate
        run: |
          git config --global user.name 'Your Name'
          git config --global user.email 'your-username@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY

      - name: Update Version File
        run: |
          # Write the new version to version.txt
          echo ${{ env.new_version }} > version.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add version.txt
          git commit -m "Increment version to ${{ env.new_version }} [skip ci]"
          git push origin ${{ github.head_ref }}


