name: 'Custom GitHub Action Workflow'

on:
  workflow_dispatch:

jobs:
  run-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v2
      
      - name: copy actions folder
        run:  cp -r .github/actions/* .

      - name: List all files in the repository
        run: ls -R /home/runner/work/prod_workflow/prod_workflow/.github

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'  # Use the appropriate Node.js version

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          cd .github/actions/custom_action
          npm install @actions/core # Install dependencies for the custom action

      - name: Run custom Node.js action
        uses: ./.github/actions/custom_action/  # Path to your custom action
        with:
          message: 'This is a custom GitHub Action!'

      - name: Print the output
        run: |
          echo "Result from action: ${{ steps.run-action.outputs.result }}"